      required: [id, allocationId, quantityReceived, receiveDate]

    CreateReceivingBody:
      type: object
      properties:
        allocationId:
          type: integer
        quantityReceived:
          type: integer
        quantityRejected:
          type: integer
        quantityDamaged:
          type: integer
        receiveDate:
          type: string
        remarks:
          type: string
      required: [allocationId, quantityReceived, receiveDate]

    UpdateReceivingBody:

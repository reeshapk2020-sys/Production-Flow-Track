openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Abaya Production Tracking and Inventory Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: master
    description: Master data management
  - name: fabric-rolls
    description: Fabric roll management
  - name: cutting
    description: Cutting batch management
  - name: allocation
    description: Allocation to stitchers
  - name: receiving
    description: Receiving from stitchers
  - name: finishing
    description: Finishing stages management
  - name: finished-goods
    description: Finished goods store
  - name: inventory
    description: Inventory management
  - name: reports
    description: Reports and analytics
  - name: traceability
    description: Batch traceability

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  # MASTER DATA
  /master/categories:
    get:
      operationId: listCategories
      tags: [master]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [master]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /master/categories/{id}:
    put:
      operationId: updateCategory
      tags: [master]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [master]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /master/sizes:
    get:
      operationId: listSizes
      tags: [master]
      summary: List all sizes
      responses:
        "200":
          description: List of sizes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Size"
    post:
      operationId: createSize
      tags: [master]
      summary: Create a size
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSizeBody"
      responses:
        "201":
          description: Created size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Size"

  /master/colors:
    get:
      operationId: listColors
      tags: [master]
      summary: List all colors
      responses:
        "200":
          description: List of colors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Color"
    post:
      operationId: createColor
      tags: [master]
      summary: Create a color
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateColorBody"
      responses:
        "201":
          description: Created color
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Color"

  /master/colors/{id}:
    put:
      operationId: updateColor
      tags: [master]
      summary: Update a color
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateColorBody"
      responses:
        "200":
          description: Updated color
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Color"

  /master/materials:
    get:
      operationId: listMaterials
      tags: [master]
      summary: List all materials (accessories)
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [master]
      summary: Create a material (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialBody"
      responses:
        "201":
          description: Created material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /master/materials/{id}:
    put:
      operationId: updateMaterial
      tags: [master]
      summary: Update a material (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialBody"
      responses:
        "200":
          description: Updated material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /master/fabrics:
    get:
      operationId: listFabrics
      tags: [master]
      summary: List all fabrics
      responses:
        "200":
          description: List of fabrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fabric"
    post:
      operationId: createFabric
      tags: [master]
      summary: Create a fabric type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFabricBody"
      responses:
        "201":
          description: Created fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"

  /master/fabrics/{id}:
    put:
      operationId: updateFabric
      tags: [master]
      summary: Update a fabric type (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFabricBody"
      responses:
        "200":
          description: Updated fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"

  /master/products:
    get:
      operationId: listProducts
      tags: [master]
      summary: List all products/designs
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [master]
      summary: Create a product/design
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /master/stitchers:
    get:
      operationId: listStitchers
      tags: [master]
      summary: List all stitchers
      responses:
        "200":
          description: List of stitchers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stitcher"
    post:
      operationId: createStitcher
      tags: [master]
      summary: Create a stitcher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStitcherBody"
      responses:
        "201":
          description: Created stitcher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stitcher"

  /master/stitchers/{id}:
    put:
      operationId: updateStitcher
      tags: [master]
      summary: Update a stitcher (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStitcherBody"
      responses:
        "200":
          description: Updated stitcher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stitcher"

  /master/teams:
    get:
      operationId: listTeams
      tags: [master]
      summary: List all teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [master]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamBody"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /master/teams/{id}:
    put:
      operationId: updateTeam
      tags: [master]
      summary: Update a team (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamBody"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /master/users:
    get:
      operationId: listUsers
      tags: [master]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"
    post:
      operationId: createUser
      tags: [master]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /master/users/{id}:
    put:
      operationId: updateUser
      tags: [master]
      summary: Update user role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  # FABRIC ROLLS
  /fabric-rolls:
    get:
      operationId: listFabricRolls
      tags: [fabric-rolls]
      summary: List all fabric rolls
      responses:
        "200":
          description: List of fabric rolls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FabricRoll"
    post:
      operationId: createFabricRoll
      tags: [fabric-rolls]
      summary: Create a fabric roll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFabricRollBody"
      responses:
        "201":
          description: Created fabric roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricRoll"

  /fabric-rolls/{id}:
    get:
      operationId: getFabricRoll
      tags: [fabric-rolls]
      summary: Get fabric roll details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fabric roll details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricRoll"
    put:
      operationId: updateFabricRoll
      tags: [fabric-rolls]
      summary: Update fabric roll (admin only — safe fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFabricRollBody"
      responses:
        "200":
          description: Updated fabric roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricRoll"

  # CUTTING
  /cutting/batches:
    get:
      operationId: listCuttingBatches
      tags: [cutting]
      summary: List all cutting batches
      responses:
        "200":
          description: List of cutting batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CuttingBatch"
    post:
      operationId: createCuttingBatch
      tags: [cutting]
      summary: Create a cutting batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCuttingBatchBody"
      responses:
        "201":
          description: Created cutting batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuttingBatch"

  /cutting/batches/{id}:
    get:
      operationId: getCuttingBatch
      tags: [cutting]
      summary: Get cutting batch details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cutting batch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuttingBatchDetail"
    put:
      operationId: updateCuttingBatch
      tags: [cutting]
      summary: Update cutting batch (admin only — safe fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCuttingBatchBody"
      responses:
        "200":
          description: Updated cutting batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuttingBatch"

  # ALLOCATION
  /allocation:
    get:
      operationId: listAllocations
      tags: [allocation]
      summary: List all allocations
      responses:
        "200":
          description: List of allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Allocation"
    post:
      operationId: createAllocation
      tags: [allocation]
      summary: Allocate cut pieces to stitcher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllocationBody"
      responses:
        "201":
          description: Created allocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"

  /allocation/{id}:
    get:
      operationId: getAllocation
      tags: [allocation]
      summary: Get allocation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Allocation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"
    put:
      operationId: updateAllocation
      tags: [allocation]
      summary: Update allocation (admin only — safe fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAllocationBody"
      responses:
        "200":
          description: Updated allocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"

  # RECEIVING
  /receiving:
    get:
      operationId: listReceivings
      tags: [receiving]
      summary: List all receivings from stitchers
      responses:
        "200":
          description: List of receivings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receiving"
    post:
      operationId: createReceiving
      tags: [receiving]
      summary: Record receiving from stitcher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReceivingBody"
      responses:
        "201":
          description: Created receiving record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receiving"

  /receiving/{id}:
    put:
      operationId: updateReceiving
      tags: [receiving]
      summary: Update receiving record (admin only — safe fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReceivingBody"
      responses:
        "200":
          description: Updated receiving record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receiving"

  # FINISHING
  /finishing:
    get:
      operationId: listFinishingRecords
      tags: [finishing]
      summary: List finishing stage records (all stages merged)
      responses:
        "200":
          description: List of finishing records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinishingRecord"
    post:
      operationId: createFinishingRecord
      tags: [finishing]
      summary: Record a finishing stage entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFinishingRecordBody"
      responses:
        "201":
          description: Created finishing record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishingRecord"

  /finishing/{id}:
    put:
      operationId: updateFinishingRecord
      tags: [finishing]
      summary: Update finishing record (admin only — safe fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFinishingRecordBody"
      responses:
        "200":
          description: Updated finishing record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishingRecord"

  /finishing/batch-info/{batchId}:
    get:
      operationId: getFinishingBatchInfo
      tags: [finishing]
      summary: Get available quantity info for finishing a batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch finishing availability info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishingBatchInfo"

  # FINISHED GOODS
  /finished-goods:
    get:
      operationId: listFinishedGoods
      tags: [finished-goods]
      summary: List finished goods inventory
      responses:
        "200":
          description: Finished goods inventory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinishedGoodsEntry"
    post:
      operationId: createFinishedGoodsEntry
      tags: [finished-goods]
      summary: Add finished goods to store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFinishedGoodsBody"
      responses:
        "201":
          description: Created finished goods entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedGoodsEntry"

  /finished-goods/{id}:
    put:
      operationId: updateFinishedGoodsEntry
      tags: [finished-goods]
      summary: Update finished goods entry (admin only — safe fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFinishedGoodsBody"
      responses:
        "200":
          description: Updated finished goods entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedGoodsEntry"

  /finished-goods/batch-info/{batchId}:
    get:
      operationId: getFinishedGoodsBatchInfo
      tags: [finished-goods]
      summary: Get available quantity for moving a batch to finished goods store
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch finished-goods availability info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedGoodsBatchInfo"

  /finished-goods/stock:
    get:
      operationId: getFinishedGoodsStock
      tags: [finished-goods]
      summary: Get current finished goods stock summary
      responses:
        "200":
          description: Stock summary by design/size/color
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSummary"

  # INVENTORY
  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Get inventory summary across all stages
      responses:
        "200":
          description: Inventory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"

  # DASHBOARD
  /dashboard:
    get:
      operationId: getDashboard
      tags: [reports]
      summary: Get dashboard data
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  # REPORTS
  /reports/stitcher-performance:
    get:
      operationId: getStitcherPerformanceReport
      tags: [reports]
      summary: Stitcher-wise performance report
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: stitcherId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Stitcher performance report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StitcherPerformance"

  /reports/daily-production:
    get:
      operationId: getDailyProductionReport
      tags: [reports]
      summary: Daily production report
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daily production report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyProductionReport"

  /reports/stage-pending:
    get:
      operationId: getStagePendingReport
      tags: [reports]
      summary: Stage-wise pending report
      responses:
        "200":
          description: Stage pending report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StagePending"

  /reports/batch-status:
    get:
      operationId: getBatchStatusReport
      tags: [reports]
      summary: Batch-wise status report
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Batch status report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchStatus"

  /reports/wip:
    get:
      operationId: getWipReport
      tags: [reports]
      summary: Work in progress report
      responses:
        "200":
          description: WIP report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WipItem"

  /reports/audit-log:
    get:
      operationId: getAuditLog
      tags: [reports]
      summary: Audit log
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  # TRACEABILITY
  /traceability/batch/{batchNumber}:
    get:
      operationId: getBatchTrace
      tags: [traceability]
      summary: Get full batch journey trace
      parameters:
        - name: batchNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full batch journey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchTrace"

  /traceability/search:
    get:
      operationId: searchTraceability
      tags: [traceability]
      summary: Search traceability records
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [batch, stitcher, product, color, size]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TraceSearchResult"


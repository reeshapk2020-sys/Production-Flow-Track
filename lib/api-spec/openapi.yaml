        id:
          type: integer
        allocationId:
          type: integer
        allocationNumber:
          type: string
        stitcherName:
          type: string
        batchNumber:
          type: string
        productCode:
          type: string
        productName:
          type: string
        sizeName:
          type: string
        colorCode:
          type: string
        colorName:
          type: string
        quantityReceived:
          type: integer
        quantityRejected:
          type: integer
        quantityDamaged:
          type: integer
        receiveDate:
          type: string
        remarks:
          type: string
        receivedBy:

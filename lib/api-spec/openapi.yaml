        batchNumber:
          type: string
        productCode:
          type: string
        productName:
          type: string
        stage:
          type: string
        quantity:
          type: integer
        daysSinceLastMovement:
          type: integer
        isDelayed:
          type: boolean
      required: [batchNumber, stage, quantity]

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        username:
          type: string
        action:
          type: string
        tableName:
          type: string
        recordId:
          type: string
        details:
          type: string
        createdAt:
          type: string
      required: [id, action, createdAt]

    # TRACEABILITY
    BatchTrace:
      type: object
      properties:
        batchNumber:
          type: string
        productCode:
          type: string
        productName:
          type: string
        sizeName:
          type: string
        colorCode:
          type: string
        colorName:
          type: string
        currentStage:
          type: string
        currentStatus:
          type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TraceEvent"
      required: [batchNumber, currentStage, timeline]

    TraceEvent:
      type: object
      properties:
        stage:
          type: string
        eventType:
          type: string
        quantity:
          type: integer
        actor:
          type: string
        date:
          type: string
        details:
          type: string
        status:
          type: string
      required: [stage, eventType, quantity, date]

    TraceSearchResult:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        label:
          type: string
        subLabel:
          type: string
        batchNumber:
          type: string
      required: [type, id, label]

          type: string
        remarks:
          type: string
        status:
          type: string
      required: [id, rollNumber, totalQuantity, availableQuantity]

    CreateFabricRollBody:
      type: object
      properties:
        rollNumber:
          type: string
        fabricId:
          type: integer
        colorId:
          type: integer
        supplier:
          type: string
        totalQuantity:
          type: number
        unit:
          type: string
        costPerUnit:
          type: number
        receivedDate:
          type: string
        remarks:
          type: string
      required: [rollNumber, fabricId, totalQuantity, unit, receivedDate]

    UpdateFabricRollBody:
      type: object
      properties:
        rollNumber:
          type: string
        supplier:
          type: string
        receivedDate:
          type: string
        remarks:
          type: string

    # CUTTING
    CuttingBatch:
      type: object
      properties:
        id:
          type: integer
        batchNumber:
          type: string
        productId:
          type: integer
        productCode:
          type: string
        productName:
          type: string
        fabricId:
          type: integer
        fabricCode:
          type: string
        fabricName:
          type: string
        materialId:
          type: integer
        materialCode:
          type: string
        materialName:
          type: string
        material2Id:
          type: integer
        material2Code:
          type: string
        material2Name:
          type: string
        sizeId:
          type: integer
        sizeName:
          type: string
        colorId:
          type: integer
        colorCode:
          type: string
        colorName:
          type: string
        itemCode:
          type: string
          description: Computed from product+fabric+material1+material2 codes joined with "-"
        quantityCut:
          type: integer
        availableForAllocation:
          type: integer
        totalAllocated:
          type: integer
        cutter:
          type: string
        cuttingDate:
          type: string
        remarks:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, batchNumber, quantityCut]

    CuttingBatchDetail:
      type: object
      properties:
        batch:
          $ref: "#/components/schemas/CuttingBatch"
        fabricRolls:
          type: array
          items:
            $ref: "#/components/schemas/BatchFabricUsage"
        allocations:
          type: array
          items:
            $ref: "#/components/schemas/Allocation"
      required: [batch, fabricRolls, allocations]

    BatchFabricUsage:
      type: object
      properties:
        rollNumber:
          type: string
        fabricName:
          type: string
        quantityUsed:
          type: number
        unit:
          type: string
      required: [rollNumber, quantityUsed]

    CreateCuttingBatchBody:
      type: object

          type: string
        productName:
          type: string
        sizeName:
          type: string
        colorCode:
          type: string
        colorName:
          type: string
        inputQuantity:
          type: integer
        outputQuantity:
          type: integer
        defectiveQuantity:
          type: integer
        pendingQuantity:
          type: integer
        operator:
          type: string
        processDate:

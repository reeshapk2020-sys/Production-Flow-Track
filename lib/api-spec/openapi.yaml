          type: integer
        stitcherId:
          type: integer
        quantityIssued:
          type: integer
        issueDate:
          type: string
        remarks:
          type: string
        batchProductId:
          type: integer
          description: Set product on the batch if missing (required for allocation)
        batchMaterialId:
          type: integer
          description: Set material 1 on the batch if missing (required for allocation)

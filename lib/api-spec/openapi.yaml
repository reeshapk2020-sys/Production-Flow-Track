          type: string
        productName:
          type: string
        fabricCode:
          type: string
        fabricName:
          type: string
        materialCode:
          type: string
        materialName:
          type: string
        material2Code:
          type: string
        material2Name:
          type: string
        itemCode:
          type: string
        sizeName:
          type: string
        colorCode:
          type: string
        colorName:
          type: string

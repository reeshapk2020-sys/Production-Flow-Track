          type: integer
        fabricId:
          type: integer
        materialId:
          type: integer
        material2Id:
          type: integer
        sizeId:
          type: integer
        colorId:
          type: integer
        quantityCut:
          type: integer
        cutter:
          type: string
        cuttingDate:
          type: string
        remarks:
          type: string
        fabricUsages:
          type: array
          items:
            type: object
            properties:
              fabricRollId:
                type: integer
              quantityUsed:
                type: number
            required: [fabricRollId, quantityUsed]
      required: [batchNumber, sizeId, colorId, quantityCut, cuttingDate]


        stitcherId:
          type: integer
        stitcherName:
          type: string
        teamName:
          type: string
        totalIssued:
          type: integer
        totalReceived:
          type: integer
        totalPending:
          type: integer
        totalRejected:
          type: integer
        efficiencyPct:
          type: number
      required: [stitcherName, totalIssued, totalReceived]

    DailyProductionReport:
      type: object
      properties:
        date:
          type: string
        cutting:
          type: integer
        allocated:
          type: integer
        received:
          type: integer
        finishing:
          type: integer
        finished:
          type: integer
      required: [date, cutting, allocated, received, finished]

    StagePending:
      type: object
      properties:
        stage:
          type: string
        pendingQuantity:
          type: integer
        batchCount:
          type: integer
      required: [stage, pendingQuantity]

    BatchStatus:
      type: object
      properties:
        batchNumber:
          type: string
        productName:
          type: string
        sizeName:
          type: string
        colorName:
          type: string
        quantityCut:
          type: integer
        quantityAllocated:
          type: integer
        quantityReceived:
          type: integer
        quantityFinished:
          type: integer
        currentStage:
          type: string
        cuttingDate:
          type: string
        status:
          type: string
      required: [batchNumber, quantityCut, currentStage]

    WipItem:
      type: object
